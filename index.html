    <meta name="theme-color" content="#06080d" />
    <meta name="description" content="Multi-Platform AI Agent Interaction Landscape — Protocol Stack, Automation Progression, and Agent System Overview" />

    <meta property="og:title" content="AI Agent Landscape" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { -webkit-text-size-adjust: 100%; }
      body { background: #06080d; overflow-y: auto; -webkit-font-smoothing: antialiased; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
      @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    </style>
